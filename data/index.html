<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento - EletronJun</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Caixa de Título Superior */
        .header-box {
            background: white;
            border: 2px solid #333;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            padding: 15px 30px;
            text-align: left;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .header-box h2 { margin: 0; font-size: 1.4em; }
        .header-box p { margin: 5px 0 0 0; font-size: 0.9em; color: #666; }
        .update-time { float: right; font-weight: bold; color: #333; }

        /* Container de Modos */
        .mode-container {
            margin-bottom: 25px;
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .mode-option {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            font-weight: bold;
        }

        .mode-option input { margin-right: 8px; transform: scale(1.2); }

        /* Grid de Sensores */
        .sensor-grid {
            display: flex;
            justify-content: center;
            gap: 25px;
            width: 100%;
            max-width: 850px;
            flex-wrap: wrap;
        }

        .sensor-card {
            background: white;
            border: 2px solid #333;
            border-radius: 30px;
            padding: 30px;
            min-width: 250px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .sensor-card h3 { margin-top: 0; font-size: 1.3em; color: #444; }

        /* Cores Originais Mantidas */
        .temp-val { color: #e67e22; font-size: 3.5em; font-weight: bold; }
        .humi-val { color: #3498db; font-size: 3.5em; font-weight: bold; }

    </style>
</head>

<body>

    <div class="header-box">
        <h2>Sistema de monitoramento de Temperatura e Umidade do ar</h2>
        <p>FCTE - EletronJun <span class="update-time">última atualização: <span id="time">--:--:--</span></span></p>
    </div>

    <div class="mode-container">
        <span style="font-weight: bold; color: #555;">Modo:</span>
        <label class="mode-option" style="color: #27ae60;">
            <input type="radio" name="modo" value="1" onclick="mudarModo(1)"> Automático
        </label>
        <label class="mode-option" style="color: #2980b9;">
            <input type="radio" name="modo" value="2" onclick="mudarModo(2)"> Ligado
        </label>
        <label class="mode-option" style="color: #7f8c8d;">
            <input type="radio" name="modo" value="0" onclick="mudarModo(0)" checked> Desligado
        </label>
    </div>

    <div class="sensor-grid">
        <div class="sensor-card">
            <h3>Temperatura</h3>
            <div class="temp-val"><span id="t">--</span> °C</div>
        </div>

        <div class="sensor-card">
            <h3>Umidade relativa</h3>
            <div class="humi-val"><span id="h">--</span> %</div>
        </div>
    </div>

    <script>
        function mudarModo(valor) {
            console.log("Modo enviado ao ESP32: " + valor);
            fetch('/update?state=' + valor)
                .then(response => console.log("Comando enviado!"));
            
            if(valor == 0) {
                document.getElementById('t').innerText = "--";
                document.getElementById('h').innerText = "--";
            }
        }

        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('time').innerText = agora.toLocaleTimeString();
        }

        setInterval(function () {
            const modoDesligado = document.querySelector('input[value="0"]').checked;
            
            if (!modoDesligado) {
                atualizarRelogio();
                fetch('/read')
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('t').innerText = data.temp;
                        document.getElementById('h').innerText = data.humi;
                    })
                    .catch(err => console.log("Aguardando ESP32..."));
            }
        }, 2000);
    </script>
</body>

</html>
